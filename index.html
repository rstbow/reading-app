<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Trent's Reading Adventure</title>
<style>
  :root {
    --green:#388E3C; --green-dark:#1B5E20; --green-light:#E8F5E9;
    --gold:#F9A825; --red:#C62828; --muted:#6B7280; --bg:#F1F8E9;
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body { font-family:-apple-system,'Segoe UI','Helvetica Neue',Arial,sans-serif; background:var(--bg); color:#1A1A1A; min-height:100vh; overflow-x:hidden; }
  .screen { display:none; min-height:100vh; }
  .screen.active { display:flex; flex-direction:column; }

  /* HOME */
  #home { background:linear-gradient(160deg,#1B5E20 0%,#2E7D32 55%,#43A047 100%); align-items:center; justify-content:center; padding:40px 24px; text-align:center; position:relative; overflow:hidden; }
  .home-icon { font-size:90px; margin-bottom:12px; animation:float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
  .home-title { font-size:38px; font-weight:900; color:white; line-height:1.15; margin-bottom:6px; text-shadow:0 4px 12px rgba(0,0,0,0.3); }
  .home-sub { font-size:17px; color:rgba(255,255,255,0.85); margin-bottom:32px; font-weight:700; }
  .home-card { background:rgba(255,255,255,0.13); border-radius:20px; padding:22px; width:100%; max-width:360px; border:2px solid rgba(255,255,255,0.22); margin-bottom:22px; }
  .name-label { color:rgba(255,255,255,0.9); font-size:15px; font-weight:800; margin-bottom:10px; display:block; text-align:left; }
  .name-input { width:100%; padding:14px 18px; border-radius:14px; border:2px solid rgba(255,255,255,0.35); background:rgba(255,255,255,0.18); color:white; font-family:inherit; font-size:20px; font-weight:800; outline:none; text-align:center; }
  .name-input::placeholder { color:rgba(255,255,255,0.45); }
  .name-input:focus { border-color:var(--gold); }
  .start-btn { background:var(--gold); color:#1A1A1A; border:none; border-radius:16px; padding:18px 44px; font-family:inherit; font-size:24px; font-weight:900; cursor:pointer; box-shadow:0 6px 24px rgba(249,168,37,0.45); transition:transform 0.15s; }
  .start-btn:active { transform:scale(0.96); }

  /* MAP */
  #map { background:var(--bg); }
  .map-header { background:linear-gradient(135deg,#1B5E20,#388E3C); padding:20px 20px 16px; color:white; box-shadow:0 4px 16px rgba(27,94,32,0.3); }
  .map-header-top { display:flex; align-items:center; gap:14px; margin-bottom:10px; }
  .map-avatar { font-size:36px; }
  .map-hd h2 { font-size:20px; font-weight:900; }
  .map-hd p { font-size:13px; opacity:0.85; font-weight:600; }
  .prog-wrap { background:rgba(255,255,255,0.25); border-radius:20px; height:10px; overflow:hidden; }
  .prog-fill { height:100%; background:var(--gold); border-radius:20px; transition:width 0.6s ease; }
  .map-scroll { flex:1; overflow-y:auto; padding:20px 18px 40px; }
  .map-title { font-size:20px; font-weight:900; color:var(--green-dark); margin-bottom:16px; text-align:center; }
  .day-card { display:flex; align-items:center; gap:14px; background:white; border-radius:16px; padding:14px 16px; margin-bottom:12px; box-shadow:0 3px 12px rgba(0,0,0,0.07); cursor:pointer; border:3px solid transparent; transition:transform 0.15s,border-color 0.2s; position:relative; }
  .day-card:active { transform:scale(0.98); }
  .day-card.locked { opacity:0.4; cursor:not-allowed; }
  .day-card.done { border-color:var(--green); }
  .day-card.done::after { content:'✓'; position:absolute; right:16px; top:50%; transform:translateY(-50%); font-size:24px; color:var(--green); font-weight:900; }
  .day-card.current { border-color:var(--gold); box-shadow:0 4px 18px rgba(249,168,37,0.28); }
  .day-num { width:50px; height:50px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:900; color:white; flex-shrink:0; }
  .day-info h3 { font-size:17px; font-weight:800; margin-bottom:2px; }
  .day-info p { font-size:12px; color:var(--muted); font-weight:600; }
  .day-emoji { font-size:26px; margin-left:auto; margin-right:32px; }

  /* STORY */
  #story { background:white; }
  .story-hdr { padding:16px 18px; display:flex; align-items:center; gap:12px; border-bottom:2px solid #F0F4F8; position:sticky; top:0; background:white; z-index:10; }
  .back-btn { width:42px; height:42px; border-radius:12px; border:none; background:#F0F4F8; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .back-btn:active { background:#E2E8F0; }
  .shdr-info { flex:1; }
  .s-day-tag { font-size:11px; font-weight:800; letter-spacing:1px; text-transform:uppercase; }
  .s-title { font-size:19px; font-weight:900; line-height:1.2; }
  .s-emoji { font-size:34px; }
  .story-body { padding:22px 22px 48px; flex:1; }

  .kw-box { border-radius:14px; padding:12px 16px; margin-bottom:22px; border-left:5px solid #388E3C; }
  .kw-lbl { font-size:12px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
  .kw-list { display:flex; flex-wrap:wrap; gap:8px; }
  .kw-chip { padding:6px 14px; border-radius:20px; font-size:16px; font-weight:800; color:white; }

  .s-line { font-size:22px; font-weight:600; line-height:2; margin-bottom:4px; padding:2px 6px; border-radius:6px; }
  .s-line .hl { background:rgba(249,168,37,0.38); border-radius:4px; padding:0 3px; font-weight:900; }

  .sec { margin-top:26px; padding-top:22px; border-top:2px solid #F0F4F8; }
  .sec-title { font-size:21px; font-weight:900; margin-bottom:4px; }
  .sec-sub { font-size:14px; color:var(--muted); font-weight:600; margin-bottom:16px; }
  .quiz-q { font-size:18px; font-weight:800; margin-bottom:12px; }
  .quiz-opts { display:flex; flex-direction:column; gap:10px; margin-bottom:18px; }
  .qopt { padding:15px 18px; border-radius:13px; border:3px solid #E2E8F0; background:white; font-family:inherit; font-size:17px; font-weight:700; cursor:pointer; text-align:left; transition:all 0.15s; }
  .qopt:active { transform:scale(0.98); }
  .qopt.correct { background:#E8F5E9; border-color:var(--green); color:var(--green-dark); }
  .qopt.wrong { background:#FFEBEE; border-color:var(--red); color:var(--red); }
  .qopt.disabled { cursor:default; }
  .quiz-fb { font-size:17px; font-weight:800; min-height:24px; margin-bottom:12px; }
  .quiz-fb.good { color:var(--green); }
  .quiz-fb.bad { color:var(--red); }

  .chk-item { display:flex; align-items:center; gap:12px; padding:13px 15px; border-radius:13px; border:3px solid #E2E8F0; margin-bottom:10px; cursor:pointer; transition:all 0.2s; font-size:17px; font-weight:700; background:white; }
  .chk-item.checked { border-color:var(--green); background:#E8F5E9; }
  .chk-box { width:30px; height:30px; border-radius:8px; border:3px solid #CBD5E1; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; transition:all 0.2s; background:white; }
  .chk-item.checked .chk-box { background:var(--green); border-color:var(--green); color:white; }

  .sig-wrap { margin-top:18px; }
  .sig-lbl { font-size:13px; font-weight:800; margin-bottom:8px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; }
  .sig-cw { border:3px solid #E2E8F0; border-radius:14px; overflow:hidden; background:#FAFAFA; position:relative; }
  canvas { display:block; touch-action:none; }
  .sig-hint { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#CBD5E1; font-size:16px; font-weight:700; pointer-events:none; transition:opacity 0.3s; text-align:center; }
  .sig-clear { margin-top:8px; background:none; border:2px solid #E2E8F0; border-radius:10px; padding:7px 14px; font-family:inherit; font-size:13px; font-weight:700; color:var(--muted); cursor:pointer; }

  .finish-btn { width:100%; margin-top:20px; padding:18px; border:none; border-radius:16px; font-family:inherit; font-size:22px; font-weight:900; cursor:pointer; transition:transform 0.15s,opacity 0.2s; color:white; box-shadow:0 6px 18px rgba(0,0,0,0.15); }
  .finish-btn:disabled { opacity:0.35; cursor:not-allowed; }
  .finish-btn:not(:disabled):active { transform:scale(0.97); }

  /* CELEBRATE */
  #celebrate { background:linear-gradient(160deg,#1B5E20 0%,#2E7D32 55%,#43A047 100%); align-items:center; justify-content:center; text-align:center; padding:40px 24px; }
  .cel-icon { font-size:96px; animation:bounce 0.6s ease infinite alternate; }
  @keyframes bounce { from{transform:scale(1)} to{transform:scale(1.15)} }
  .cel-stars { font-size:34px; margin:10px 0; }
  .cel-title { font-size:44px; font-weight:900; color:var(--gold); margin-bottom:8px; text-shadow:0 4px 12px rgba(0,0,0,0.3); }
  .cel-name { font-size:26px; color:white; font-weight:900; margin-bottom:10px; }
  .cel-msg { font-size:19px; color:rgba(255,255,255,0.9); font-weight:600; margin-bottom:32px; line-height:1.6; white-space:pre-line; }
  .cel-btn { background:var(--gold); color:#1A1A1A; border:none; border-radius:16px; padding:16px 36px; font-family:inherit; font-size:22px; font-weight:900; cursor:pointer; box-shadow:0 6px 24px rgba(249,168,37,0.4); transition:transform 0.15s; }
  .cel-btn:active { transform:scale(0.96); }

  .toast { position:fixed; top:16px; right:16px; background:#1B5E20; color:white; padding:10px 18px; border-radius:12px; font-size:14px; font-weight:800; z-index:999; opacity:0; transition:opacity 0.3s; pointer-events:none; }
  .toast.show { opacity:1; }
</style>
</head>
<body>

<div class="toast" id="toast">✅ Progress Saved!</div>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="home-icon">🍎</div>
  <h1 class="home-title">Trent's Reading<br>Adventure</h1>
  <p class="home-sub">Johnny Appleseed • 10 Days</p>
  <div class="home-card">
    <label class="name-label">What is your name?</label>
    <input class="name-input" id="nameInput" type="text" placeholder="Type your name..." maxlength="30" autocomplete="off">
  </div>
  <button class="start-btn" onclick="startApp()">Let's Go! 🍎</button>
</div>

<!-- MAP -->
<div id="map" class="screen">
  <div class="map-header">
    <div class="map-header-top">
      <div class="map-avatar">🍎</div>
      <div class="map-hd">
        <h2 id="mapName">Reading Adventure</h2>
        <p id="mapProg">0 of 10 days done</p>
      </div>
    </div>
    <div class="prog-wrap"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  </div>
  <div class="map-scroll">
    <div class="map-title">Choose Today's Story 🌳</div>
    <div id="dayList"></div>
  </div>
</div>

<!-- STORY -->
<div id="story" class="screen">
  <div class="story-hdr">
    <button class="back-btn" onclick="showMap()">←</button>
    <div class="shdr-info">
      <div class="s-day-tag" id="sDayTag"></div>
      <div class="s-title" id="sTitle"></div>
    </div>
    <div class="s-emoji" id="sEmoji"></div>
  </div>
  <div class="story-body" id="storyBody"></div>
</div>

<!-- CELEBRATE -->
<div id="celebrate" class="screen">
  <div class="cel-icon">🏆</div>
  <div class="cel-stars">⭐ ⭐ ⭐</div>
  <div class="cel-title">You Did It!</div>
  <div class="cel-name" id="celName"></div>
  <div class="cel-msg" id="celMsg"></div>
  <button class="cel-btn" onclick="showMap()">Back to My Days 🗺️</button>
</div>

<script>
const STORIES = [
  { day:1, title:"Johnny Loved Apples", emoji:"🍎", color:"#C62828", bg:"#FFEBEE",
    keyWords:["apple","Johnny","loved","plant","seed"],
    lines:["Johnny loved apples.","He loved them a lot.","He ate apples every day.","Red apples. Green apples.","Big apples. Small apples.","Johnny loved them all.","He had a big bag of seeds.","Apple seeds.","He wanted to plant the seeds.","He wanted apple trees to grow.","That is why his name was Johnny Appleseed.","Johnny loved apples.","And he wanted to share them.","With everyone."],
    quiz:{ q:"Why was his name Johnny Appleseed?", opts:["He sold apples","He planted apple seeds","He ate too many apples","He lived in an apple tree"], ans:1 }
  },
  { day:2, title:"Johnny Goes to the Store", emoji:"🏪", color:"#E65100", bg:"#FFF3E0",
    keyWords:["store","buy","apples","bag","went"],
    lines:["Johnny went to the store.","He had his bag with him.","He went to get apples.","The store had lots of apples.","Red ones on the left.","Green ones on the right.","Johnny looked at them all.","He picked up a red apple.","It was big and round.","He put it in his bag.","He got more apples.","One. Two. Three. Four. Five.","Five apples in his bag.","He paid at the store.","Then he went back home.","He had a good bag of apples."],
    quiz:{ q:"How many apples did Johnny get?", opts:["Three","Four","Five","Six"], ans:2 }
  },
  { day:3, title:"The First Seed", emoji:"🌱", color:"#2E7D32", bg:"#E8F5E9",
    keyWords:["seed","dig","soil","plant","grow"],
    lines:["Johnny had one seed.","Just one small seed.","He went out to the yard.","He dug a small hole.","The soil was soft and dark.","He put the seed in the hole.","He covered it with soil.","He gave it some water.","Then he sat and looked at it.","Nothing yet.","He came back the next day.","Still nothing.","But Johnny did not give up.","He knew the seed was growing.","Down in the dark soil.","It just needed time."],
    quiz:{ q:"What did Johnny do after putting the seed in the hole?", opts:["He dug it back up","He covered it with soil","He ate it","He walked away"], ans:1 }
  },
  { day:4, title:"The Long Walk", emoji:"👟", color:"#1565C0", bg:"#E3F2FD",
    keyWords:["walk","far","road","tired","keep"],
    lines:["Johnny had a long walk ahead.","He had his bag of seeds.","He had his hat on his head.","He set off down the road.","The road was long.","It went up a hill.","It went down the other side.","Johnny kept going.","His feet got tired.","But he kept going.","He had seeds to plant.","He walked and walked.","Far down the road.","Past trees. Past farms.","Johnny did not stop.","He had a job to do."],
    quiz:{ q:"What did Johnny carry on his walk?", opts:["A map","A bag of seeds","A bucket of water","An axe"], ans:1 }
  },
  { day:5, title:"The Apple Tree Grows", emoji:"🌳", color:"#388E3C", bg:"#E8F5E9",
    keyWords:["tree","grow","tall","green","leaves"],
    lines:["One day, Johnny saw it.","A small green shoot.","It came up from the soil.","His seed had grown!","He gave it water.","He gave it sun.","Day by day it grew.","It got taller.","Green leaves came out.","One leaf. Then two. Then more.","The tree was growing.","Johnny smiled a big smile.","His tree was alive.","He had planted one seed.","And now he had a tree.","A real apple tree."],
    quiz:{ q:"What came up from the soil?", opts:["A worm","A green shoot","A flower","A rock"], ans:1 }
  },
  { day:6, title:"Sharing the Apples", emoji:"🤝", color:"#00695C", bg:"#E0F2F1",
    keyWords:["share","give","friend","kind","happy"],
    lines:["The tree had apples on it.","Big red apples.","Johnny picked one.","He ate it.","It was sweet and good.","Then he saw his friend.","His friend looked hungry.","Johnny picked two more apples.","He gave one to his friend.",'"Here," said Johnny. "Take this."',"His friend smiled.",'"Thank you," his friend said.',"Johnny felt good.","It felt good to share.","One apple for him.","One apple for his friend."],
    quiz:{ q:"How did Johnny feel when he shared?", opts:["Sad","Angry","Good","Tired"], ans:2 }
  },
  { day:7, title:"More Seeds to Plant", emoji:"🌾", color:"#5D4037", bg:"#EFEBE9",
    keyWords:["more","seeds","plant","field","work"],
    lines:["Johnny had more seeds.","A whole bag of seeds.","He went to a big field.","The field was wide and flat.","He dug a hole.","He put a seed in.","He covered it up.","Then he dug another hole.","Another seed went in.","He did this again and again.","Dig. Plant. Cover. Move on.","Dig. Plant. Cover. Move on.","The field had lots of seeds now.","Johnny looked at the field.","One day this field would have trees.","Lots and lots of apple trees."],
    quiz:{ q:"What did Johnny do again and again?", opts:["Run and jump","Dig, plant, cover, move on","Eat and sleep","Sing and dance"], ans:1 }
  },
  { day:8, title:"The Cold Night", emoji:"❄️", color:"#283593", bg:"#E8EAF6",
    keyWords:["cold","night","fire","warm","safe"],
    lines:["The sun went down.","It got cold.","Very cold.","Johnny was far from home.","He found a spot under a tree.","He made a small fire.","The fire gave off light.","The fire gave off heat.","Johnny sat by the fire.","He felt warm now.","He ate an apple for his supper.","He looked up at the stars.","The stars were bright.","Johnny felt safe by his fire.","He went to sleep.","Tomorrow he would plant more seeds."],
    quiz:{ q:"What did Johnny eat for supper?", opts:["Bread","Soup","An apple","A carrot"], ans:2 }
  },
  { day:9, title:"A Forest of Apple Trees", emoji:"🌲", color:"#4527A0", bg:"#EDE7F6",
    keyWords:["forest","trees","apples","grew","planted"],
    lines:["Years went by.","Johnny planted seeds every day.","Every single day.","The seeds grew into trees.","The trees grew tall.","They were full of apples.","Red apples. Green apples.","Apples for everyone.","People came to pick them.","Kids came to eat them.","Birds came to sit in the trees.","Johnny walked through his trees.","He looked at all he had planted.","One seed at a time.","He had made a forest.","A forest of apple trees."],
    quiz:{ q:"How did Johnny grow all those trees?", opts:["All at once","One seed at a time","With a big machine","By wishing"], ans:1 }
  },
  { day:10, title:"Trent's Story", emoji:"⭐", color:"#F9A825", bg:"#FFFDE7",
    keyWords:["read","did","story","proud","Trent"],
    lines:["This story started with you, Trent.","You wrote about Johnny.","You said Johnny always wanted apples.","That is why his name was Johnny Appleseed.","You said he went to the store.","He went to get the apples.","That was your story.","And it was a good story.","You gave Johnny his start.","You made him real.","Now you have read ten stories.","Ten whole stories.","You did not stop.","You kept going.","Just like Johnny.","Be proud, Trent. You did it."],
    quiz:{ q:"Who wrote the first story about Johnny?", opts:["A teacher","A book","Trent","Johnny himself"], ans:2 }
  }
];

let userName="", completed=[], currentDay=null;
let sigCanvas, sigCtx, drawing=false, hasSig=false;
let checks=[false,false,false], quizDone=false;
const KEY='trent_reading_v1';

function saveProgress() {
  try { localStorage.setItem(KEY, JSON.stringify({name:userName, completed})); showToast(); } catch(e){}
}
function loadProgress(name) {
  try {
    const d=JSON.parse(localStorage.getItem(KEY)||'{}');
    if (d.name && d.name.toLowerCase()===name.toLowerCase()) return d.completed||[];
  } catch(e){}
  return [];
}
function showToast() {
  const t=document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800);
}
function show(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function startApp() {
  const n=document.getElementById('nameInput').value.trim();
  if(!n){document.getElementById('nameInput').focus();return;}
  userName=n; completed=loadProgress(n); showMap();
}
function showMap() {
  show('map');
  document.getElementById('mapName').textContent=userName+"'s Adventure";
  const done=completed.length;
  document.getElementById('mapProg').textContent=done+" of 10 days done";
  document.getElementById('progFill').style.width=(done*10)+"%";
  const list=document.getElementById('dayList'); list.innerHTML='';
  STORIES.forEach((s,i)=>{
    const isDone=completed.includes(i);
    const isCur=!isDone&&(i===0||completed.includes(i-1));
    const isLocked=!isDone&&!isCur;
    const c=document.createElement('div');
    c.className='day-card'+(isDone?' done':'')+(isCur?' current':'')+(isLocked?' locked':'');
    c.innerHTML=`<div class="day-num" style="background:${s.color}">${s.day}</div><div class="day-info"><h3>${s.title}</h3><p>Day ${s.day}</p></div><div class="day-emoji">${s.emoji}</div>`;
    if(!isLocked) c.onclick=()=>openStory(i);
    list.appendChild(c);
  });
}
function hl(line,kws) {
  let o=line;
  kws.forEach(kw=>{ o=o.replace(new RegExp('\\b('+kw+')\\b','gi'),'<span class="hl">$1</span>'); });
  return o;
}
function openStory(idx) {
  currentDay=idx; checks=[false,false,false]; quizDone=false; hasSig=false;
  const s=STORIES[idx];
  document.getElementById('sDayTag').textContent='DAY '+s.day;
  document.getElementById('sDayTag').style.color=s.color;
  document.getElementById('sTitle').textContent=s.title;
  document.getElementById('sEmoji').textContent=s.emoji;
  const body=document.getElementById('storyBody'); body.innerHTML='';

  // key words
  const kb=document.createElement('div'); kb.className='kw-box';
  kb.style.cssText=`border-color:${s.color};background:${s.bg}`;
  kb.innerHTML=`<div class="kw-lbl">Look for these words 👀</div><div class="kw-list">${s.keyWords.map(w=>`<span class="kw-chip" style="background:${s.color}">${w}</span>`).join('')}</div>`;
  body.appendChild(kb);

  // lines
  s.lines.forEach(line=>{ const p=document.createElement('div'); p.className='s-line'; p.innerHTML=hl(line,s.keyWords); body.appendChild(p); });

  // quiz
  const qd=document.createElement('div'); qd.className='sec';
  qd.innerHTML=`<div class="sec-title" style="color:${s.color}">Quick Check ✏️</div><div class="sec-sub">Tap the right answer</div><div class="quiz-q">${s.quiz.q}</div><div class="quiz-opts" id="qOpts">${s.quiz.opts.map((o,i)=>`<button class="qopt" onclick="answerQuiz(${i},${s.quiz.ans})">${o}</button>`).join('')}</div><div class="quiz-fb" id="qFb"></div>`;
  body.appendChild(qd);

  // signoff
  const sd=document.createElement('div'); sd.className='sec';
  sd.innerHTML=`<div class="sec-title" style="color:${s.color}">Sign Off ✍️</div><div style="height:6px"></div>${['I read every word','I found the key words','I am proud of myself'].map((l,i)=>`<div class="chk-item" id="chk${i}" onclick="toggleChk(${i})"><div class="chk-box" id="box${i}"></div><span>${l}</span></div>`).join('')}<div class="sig-wrap"><div class="sig-lbl">Sign your name</div><div class="sig-cw"><canvas id="sigCanvas" height="130"></canvas><div class="sig-hint" id="sigHint">✍️ Draw your name here</div></div><button class="sig-clear" onclick="clearSig()">Clear ✕</button></div><button class="finish-btn" id="finBtn" style="background:${s.color}" onclick="finishDay()" disabled>Done for Today! 🎉</button>`;
  body.appendChild(sd);

  show('story'); setupCanvas();
}
function answerQuiz(chosen,correct) {
  if(quizDone) return; quizDone=true;
  document.querySelectorAll('.qopt').forEach((o,i)=>{ o.classList.add('disabled'); if(i===correct) o.classList.add('correct'); else if(i===chosen) o.classList.add('wrong'); });
  const fb=document.getElementById('qFb');
  if(chosen===correct){fb.textContent='✅ Yes! That is right!';fb.className='quiz-fb good';}
  else{fb.textContent='❌ Not quite — the green one is right.';fb.className='quiz-fb bad';}
  checkReady();
}
function toggleChk(i) {
  checks[i]=!checks[i];
  document.getElementById('chk'+i).classList.toggle('checked',checks[i]);
  document.getElementById('box'+i).textContent=checks[i]?'✓':'';
  checkReady();
}
function checkReady() { document.getElementById('finBtn').disabled=!(checks.every(Boolean)&&hasSig&&quizDone); }
function setupCanvas() {
  sigCanvas=document.getElementById('sigCanvas');
  sigCanvas.width=sigCanvas.parentElement.clientWidth||340;
  sigCtx=sigCanvas.getContext('2d');
  sigCtx.strokeStyle='#1A1A1A'; sigCtx.lineWidth=4; sigCtx.lineCap='round'; sigCtx.lineJoin='round';
  function pos(e){const r=sigCanvas.getBoundingClientRect(),src=e.touches?e.touches[0]:e;return{x:src.clientX-r.left,y:src.clientY-r.top};}
  sigCanvas.addEventListener('mousedown',e=>{drawing=true;const p=pos(e);sigCtx.beginPath();sigCtx.moveTo(p.x,p.y);});
  sigCanvas.addEventListener('mousemove',e=>{if(!drawing)return;e.preventDefault();const p=pos(e);sigCtx.lineTo(p.x,p.y);sigCtx.stroke();hasSig=true;document.getElementById('sigHint').style.opacity='0';checkReady();});
  sigCanvas.addEventListener('mouseup',()=>drawing=false);
  sigCanvas.addEventListener('touchstart',e=>{drawing=true;const p=pos(e);sigCtx.beginPath();sigCtx.moveTo(p.x,p.y);},{passive:false});
  sigCanvas.addEventListener('touchmove',e=>{if(!drawing)return;e.preventDefault();const p=pos(e);sigCtx.lineTo(p.x,p.y);sigCtx.stroke();hasSig=true;document.getElementById('sigHint').style.opacity='0';checkReady();},{passive:false});
  sigCanvas.addEventListener('touchend',()=>drawing=false);
}
function clearSig(){sigCtx.clearRect(0,0,sigCanvas.width,sigCanvas.height);hasSig=false;document.getElementById('sigHint').style.opacity='1';checkReady();}
function finishDay() {
  if(!completed.includes(currentDay)) completed.push(currentDay);
  saveProgress();
  const s=STORIES[currentDay];
  document.getElementById('celName').textContent=userName+'!';
  const msgs=["You finished Day "+s.day+".\nYou are doing great!","Day "+s.day+" is done.\nYou are getting stronger every day!","Another story done, "+userName+".\nKeep it up — you are on a roll!"];
  document.getElementById('celMsg').textContent=msgs[currentDay%msgs.length];
  show('celebrate');
}
window.onload=()=>{
  try{const d=JSON.parse(localStorage.getItem(KEY)||'{}');if(d.name)document.getElementById('nameInput').value=d.name;}catch(e){}
};
</script>
</body>
</html>
